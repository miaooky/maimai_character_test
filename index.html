    /* ==========================================================
       ⚙️ 核心逻辑代码 (已修复 Bug)
       ========================================================== */

    // 应用全局配置到 UI
    // 🛠️ 修复：将错误的 pageTitle 改为修改网页的 <title> 标签
    document.title = CONFIG.title; 
    document.getElementById('uiLogo').textContent = CONFIG.logoEmoji;
    document.getElementById('uiTitle').textContent = CONFIG.title;
    document.getElementById('uiTitle').style.color = CONFIG.colors.primary;
    document.getElementById('uiSubtitle').textContent = CONFIG.subtitle;
    document.getElementById('uiDesc').innerHTML = CONFIG.desc;

    var btnStart = document.getElementById('btnStart');
    btnStart.style.background = 'linear-gradient(135deg, ' + CONFIG.colors.primary + ', ' + CONFIG.colors.secondary + ')';

    // 动态注入悬停和焦点样式
    var styleSheet = document.createElement("style");
    styleSheet.innerText = 
      '.option-btn:hover { border-color: ' + CONFIG.colors.primary + ' !important; background: ' + CONFIG.colors.hoverBg + ' !important; color: ' + CONFIG.colors.hoverText + ' !important; }' +
      '.nickname-input:focus { border-color: ' + CONFIG.colors.primary + ' !important; }';
    document.head.appendChild(styleSheet);

    // 状态变量
    var currentQ = 0;
    var scores = {};
    var history = []; 
    var userNickname = ""; 
    for (var key in CONFIG.characters) { scores[key] = 0; }

    document.getElementById('btnStart').addEventListener('click', function() {
      var rawName = document.getElementById('nicknameInput').value.trim();
      userNickname = rawName; 

      document.getElementById('startPage').style.display = 'none';
      document.getElementById('quizPage').style.display = 'block';
      currentQ = 0;
      history = [];
      for (var k in scores) { scores[k] = 0; }
      renderQuestion();
    });

    function renderQuestion() {
      var q = CONFIG.questions[currentQ];
      var total = CONFIG.questions.length;
      
      var pBar = document.getElementById('progressBar');
      pBar.style.width = ((currentQ / total) * 100) + '%';
      pBar.style.background = 'linear-gradient(90deg, ' + CONFIG.colors.primary + ', ' + CONFIG.colors.secondary + ')';
      
      document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + total;
      
      var qNum = document.getElementById('qNumber');
      qNum.textContent = 'Q' + (currentQ + 1);
      qNum.style.background = 'linear-gradient(135deg, ' + CONFIG.colors.primary + ', ' + CONFIG.colors.secondary + ')';
      
      document.getElementById('qText').textContent = q.q;
      
      var wrap = document.getElementById('optionsWrap');
      wrap.innerHTML = '';
      var labels = ['A', 'B', 'C', 'D'];
      
      var selectedIdx = history[currentQ] !== undefined ? history[currentQ] : -1;

      for (var i = 0; i < q.opts.length; i++) {
        var opt = q.opts[i];
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        
        var labelStyle = 'display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:#e0e0e0;color:#666;border-radius:50%;font-size:12px;font-weight:700;margin-right:10px;';
        if (selectedIdx === i) {
          labelStyle = 'display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:' + CONFIG.colors.primary + ';color:#fff;border-radius:50%;font-size:12px;font-weight:700;margin-right:10px;';
          btn.style.borderColor = CONFIG.colors.primary;
          btn.style.background = CONFIG.colors.hoverBg;
          btn.style.color = CONFIG.colors.hoverText;
        }

        btn.innerHTML = '<span style="' + labelStyle + '">' + labels[i] + '</span>' + opt.text;
        btn.setAttribute('data-index', i);
        btn.addEventListener('click', function() {
          selectOption(parseInt(this.getAttribute('data-index')));
        });
        wrap.appendChild(btn);
      }

      document.getElementById('btnPrev').disabled = (currentQ === 0);
      
      var btnNext = document.getElementById('btnNext');
      if (currentQ === total - 1) {
        btnNext.textContent = '查看结果 ✨';
        btnNext.disabled = (history[currentQ] === undefined);
      } else {
        btnNext.textContent = '下一题 →';
        btnNext.disabled = (history[currentQ] === undefined);
      }
    }

    function selectOption(idx) {
      if (history[currentQ] !== undefined) {
        var oldScores = CONFIG.questions[currentQ].opts[history[currentQ]].scores;
        for (var k in oldScores) { scores[k] -= oldScores[k]; }
      }

      history[currentQ] = idx;
      var newScores = CONFIG.questions[currentQ].opts[idx].scores;
      for (var k in newScores) { scores[k] = (scores[k] || 0) + newScores[k]; }
      
      if (currentQ < CONFIG.questions.length - 1) {
        currentQ++;
      }
      renderQuestion();
    }

    document.getElementById('btnPrev').addEventListener('click', function() {
      if (currentQ > 0) { currentQ--; renderQuestion(); }
    });

    document.getElementById('btnNext').addEventListener('click', function() {
      if (history[currentQ] === undefined) return;
      if (currentQ < CONFIG.questions.length - 1) {
        currentQ++;
        renderQuestion();
      } else {
        document.getElementById('progressBar').style.width = '100%';
        setTimeout(showResult, 300);
      }
    });

    function getResult() {
      var maxScore = -1;
      var resultKey = Object.keys(CONFIG.characters)[0];
      for (var k in scores) {
        if (scores[k] > maxScore) { maxScore = scores[k]; resultKey = k; }
      }
      return resultKey;
    }

    function replaceName(text) {
      if (userNickname) {
        return text.replace(/{name}的/g, userNickname + '的').replace(/{name}/g, userNickname);
      } else {
        return text.replace(/{name}的/g, '你的').replace(/{name}/g, '你');
      }
    }

    function showResult() {
      document.getElementById('quizPage').style.display = 'none';
      document.getElementById('resultPage').style.display = 'block';
      
      var key = getResult();
      var c = CONFIG.characters[key];
      
      var tagsHtml = '';
      for (var i = 0; i < c.tags.length; i++) {
        tagsHtml += '<span class="tag" style="background:' + CONFIG.colors.tagBg + ';color:' + CONFIG.colors.tagText + ';">' + c.tags[i] + '</span>';
      }
      
      var finalDesc = replaceName(c.desc);
      
      var html = '<div class="result-header" style="background: ' + c.gradient + '">';
      html += '<div class="result-label">✨ ' + (userNickname ? userNickname + '，你的' : '你的') + '灵魂看板娘是 ✨</div>';
      html += '<div class="char-name">' + c.name + '</div>';
      html += '<div class="char-name-jp">' + c.nameJp + '</div>';
      html += '</div>';
      html += '<div class="result-avatar">';
      html += '<img src="' + c.image + '" alt="' + c.name + '" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<span style=font-size:72px>🎵</span>\'">';
      html += '</div>';
      html += '<div class="result-body">';
      html += '<div class="result-tags">' + tagsHtml + '</div>';
      html += '<p class="result-desc">' + finalDesc + '</p>';
      html += '<div class="result-quote" style="border-left: 3px solid ' + CONFIG.colors.primary + ';">' + c.quote + '</div>';
      html += '<div class="result-actions">';
      html += '<button class="btn-action btn-retry" id="btnRetry">🔄 再测一次</button>';
      html += '<button class="btn-action btn-share" id="btnShare" style="background: linear-gradient(135deg, ' + CONFIG.colors.primary + ', ' + CONFIG.colors.secondary + ');">📤 分享结果</button>';
      html += '</div>';
      html += '</div>';
      
      document.getElementById('resultCard').innerHTML = html;

      document.getElementById('btnRetry').addEventListener('click', function() {
        document.getElementById('resultPage').style.display = 'none';
        document.getElementById('startPage').style.display = 'block';
        window.scrollTo(0, 0);
      });
      
      document.getElementById('btnShare').addEventListener('click', function() {
        var sharePrefix = userNickname ? ('【' + userNickname + '】测出了') : '我测出了';
        var text = '在"测测你是maimai DX里的哪位看板娘"中，' + sharePrefix + '：' + c.name + ' (' + c.nameJp + ')！' + c.tags.join('、') + ' —— 快来测测你的本命看板娘吧！';
        
        if (navigator.share) {
          navigator.share({ title: CONFIG.title, text: text }).catch(function(){});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function() {
            alert('结果已复制到剪贴板！快去分享给朋友吧～');
          });
        } else {
          prompt('复制以下文字分享吧：', text);
        }
      });
      
      window.scrollTo(0, 0);
    }
    </script>
</body>
